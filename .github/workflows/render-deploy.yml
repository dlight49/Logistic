name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

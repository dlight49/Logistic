name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          if [ -n "${{ secrets.APP_URL }}" ]; then
            curl -f "${{ secrets.APP_URL }}/api/health" || echo "Ping failed but continuing"
          else
            echo "APP_URL secret not set. Skipping ping."
          fi
